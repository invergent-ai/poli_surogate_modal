# ==========================================================================
# Surogate SFT config - recipe FP8-hybrid
# Rulat cu:  modal run run_gpu_test.py::test_l40s
# Cere SM ≥ 8.9 (Ada Lovelace+): L4, L40S, H100, H200, RTX PRO 6000, B200.
# NU merge pe: T4, A10, A100 (Ampere, fără tensor cores FP8).
# ==========================================================================

model: Qwen/Qwen3-0.6B
output_dir: /output

per_device_train_batch_size: 2
gradient_accumulation_steps: 4

sample_packing: true
sequence_len: 2048

max_steps: 50
eval_steps: 0

learning_rate: 2e-4
warmup_ratio: 0.15

# --- FP8-hybrid ---
# Matmul-urile mari (attention, MLP) rulează în FP8 (E4M3), weights/optim rămân BF16.
# Pe Ada/Hopper crește throughput-ul cu ~2× față de BF16 cu aceeași calitate.
recipe: fp8-hybrid

lora: true
lora_rank: 16
lora_alpha: 32
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

dataloader_num_workers: 4
datasets:
  - path: "OpenLLM-Ro/ro_gsm8k"
    type: auto
