# ==========================================================================
# Surogate SFT config — recipe NVFP4 (doar Blackwell)
# Rulat cu:  modal run run_gpu_test.py::test_rtx_pro_6000
# Cere SM ≥ 10.0: RTX PRO 6000, B200.
# NU merge pe: T4, L4, A10, L40S, A100-*, H100, H200.
# ==========================================================================

model: Qwen/Qwen3-0.6B
output_dir: /output

per_device_train_batch_size: 2
gradient_accumulation_steps: 4

sample_packing: true
sequence_len: 2048

max_steps: 50
eval_steps: 0

learning_rate: 2e-4
warmup_ratio: 0.15

# --- NVFP4 ---
# Matmul-urile rulează în FP4 (E2M1) folosind tensor cores Blackwell.
# Peak theoretic ~4× față de BF16. Loss-ul final e puțin mai mare — trade-off normal.
recipe: nvfp4
fp4_backend: cutlass                   # kernel-ul FP4. Alternativă: "cudnn".
skip_quant_last_layers: 4              # ultimele N blocuri rămân în BF16 pentru stabilitate numerică.

lora: true
lora_rank: 16
lora_alpha: 32
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

dataloader_num_workers: 4
datasets:
  - path: "OpenLLM-Ro/ro_gsm8k"
    type: auto
